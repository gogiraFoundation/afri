server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:;" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml;

    # --- Optional per-IP rate limiting (defense in depth; DRF throttles are app-level) ---
    # `limit_req_zone` must live in the `http { }` context (main nginx.conf or an included
    # snippet loaded before this server block). Example:
    #
    #   limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
    #
    # Then inside `location /api/` below you can add:
    #
    #   limit_req zone=api_per_ip burst=20 nodelay;
    #
    # Tradeoff: that limits *all* /api/ traffic per IP (GET and POST), not only POST to
    # booking/contact. For POST-only or path-specific limits, use a WAF (e.g. Cloud Armor,
    # Cloudflare) or advanced nginx `map`/`if` patterns. This stack already forwards:
    #   X-Real-IP, X-Forwarded-For, X-Forwarded-Proto — ensure the *first* XFF hop is your
    # trusted edge so backend IP-based logic (reCAPTCHA remoteip, throttles) is meaningful.

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routes such as /book and /one-pager fall through to index.html (see `try_files` below).
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
