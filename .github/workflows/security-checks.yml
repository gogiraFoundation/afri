name: Security Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install bandit pip-audit

      - name: Django deploy checks
        env:
          SECRET_KEY: ci-security-check-secret-key
          ENVIRONMENT: production
          DEBUG: "False"
          ALLOWED_HOSTS: example.com
          CSRF_TRUSTED_ORIGINS: https://example.com
          CORS_ALLOWED_ORIGINS: https://example.com
          DJANGO_SETTINGS_MODULE: afri_cleans.settings
          CONTACT_FORM_CAPTCHA_SECRET: ci-placeholder-not-used-in-tests
        run: python backend/manage.py check --deploy

      - name: Bandit scan
        run: bandit -r backend -x backend/**/migrations

      - name: pip-audit scan
        run: pip-audit -r backend/requirements.txt

  frontend-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (high+)
        working-directory: frontend
        run: npm audit --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
