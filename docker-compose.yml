# Production-style stack: Postgres + Django API + Nginx (React SPA, proxies /api).
# Usage: docker compose up --build
# Set secrets via environment or a compose override — do not commit real passwords.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: africleans
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: africleans
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U africleans -d africleans"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://africleans:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/africleans
      SECRET_KEY: ${SECRET_KEY:-replace-me-use-long-random-string-in-real-deployments}
      ENVIRONMENT: production
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      TRUST_X_FORWARDED_PROTO: "true"
      # Local stack: no reCAPTCHA secret; opt out explicitly (use real secret + unset this in real prod).
      ALLOW_PUBLIC_FORMS_WITHOUT_CAPTCHA: "true"
      DEFAULT_VAT_RATE: ${DEFAULT_VAT_RATE:-0.20}
      APPLY_VAT_BY_DEFAULT: ${APPLY_VAT_BY_DEFAULT:-True}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
